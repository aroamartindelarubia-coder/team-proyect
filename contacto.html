<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ARQUITECTURE CONTACTOS</title>

<style>
:root {
    --primary: #1a252f;
    --accent: #d35400;
    --white: #ffffff;
}

body, html {
    margin: 0;
    padding: 0;
    height: 100%;
    font-family: 'Segoe UI', sans-serif;
}

/* FONDO */
.hero-background {
    position: fixed;
    width: 100%;
    height: 100%;
    background-image: url('https://images.unsplash.com/photo-1521737604893-d14cc237f11d?q=80&w=2070&auto=format&fit=crop');
    background-size: cover;
    background-position: center;
    z-index: -2;
}

/* OVERLAY */
.overlay {
    position: fixed;
    width: 100%;
    height: 100%;
    background: rgba(15, 23, 42, 0.85);
    backdrop-filter: blur(6px);
    z-index: -1;
}

/* CONTENIDO */
.container {
    text-align: center;
    padding: 60px 20px;
    color: white;
}

/* HEADER */
h1 {
    font-size: 2.5rem;
    letter-spacing: 2px;
    margin-bottom: 10px;
}

.divider {
    width: 80px;
    height: 4px;
    background: var(--accent);
    margin: 20px auto;
}

/* IMAGEN */
.logo {
    width: 220px;
    border-radius: 12px;
    margin-top: 20px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.5);
}

/* BOTONES */
.buttons {
    margin-top: 30px;
}

button {
    padding: 12px 18px;
    margin: 10px;
    border: 1px solid var(--accent);
    background: transparent;
    color: white;
    border-radius: 6px;
    cursor: pointer;
    text-transform: uppercase;
    font-size: 0.8rem;
    transition: 0.3s;
}

button:hover {
    background: var(--accent);
    color: black;
}

/* INFO BOX */
.info {
    margin-top: 30px;
    padding: 20px;
    width: 60%;
    margin-left: auto;
    margin-right: auto;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 10px;
    display: none;
    color: #cbd5e1;
}
</style>

<script>
function showInfo(type) {
    let info = document.getElementById("info");

    if (type === "contacto") {
        info.innerHTML = "📞 Teléfono: +34 638 68 68 25";
    }

    if (type === "ubicacion") {
        info.innerHTML = "📍 Ubicación: Av. de Castilla-La Mancha, 89, 28701 San Sebastián de los Reyes, Madrid, España";
    }

    if (type === "email") {
        info.innerHTML = "📧 Email: contacto@serprofes.com";
    }

    info.style.display = "block";
}
</script>

</head>

<body>

<div class="hero-background"></div>
<div class="overlay"></div>

<div class="container">

    <h1>CONTACTOS</h1>
    <div class="divider"></div>

    <p>- ARQUITECTURE - </p>
    <p> Empresa dedicada a la formación en FP de arquitectura y diseño sostenible, enfocada en el desarrollo profesional.</p>

    <!-- ⚠️ TU IMAGEN (puede fallar) -->
    <img src="https://static.vecteezy.com/system/resources/previews/053/762/205/non_2x/architecture-logo-am-initial-icon-with-creative-illustration-vector.jpg" alt="IA SERPROFES" class="logo">

    <div class="buttons">
        <button onclick="showInfo('contacto')">Contacto</button>
        <button onclick="showInfo('ubicacion')">Ubicación</button>
        <button onclick="showInfo('email')">Email</button>
    </div>

    <div id="info" class="info"></div>

</div>

</body>
</html>
